# This workflow will build a Java project with Maven and bundle them as native app installers with jDeploy
# See https://www.jdeploy.com for more information.

name: jDeploy CI with Maven

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # Für Releases und Assets
  id-token: write      # Für OIDC (npm)
  packages: write      # Für GitHub Packages
  pull-requests: read  # Basis-Berechtigung

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Wichtig für Tags

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Build App Installer Bundles
        uses: shannah/jdeploy@master  # Offiziell empfohlen [web:2]
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}